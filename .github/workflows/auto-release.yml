name: Auto Release

# Ships a release for every push to main that isn't docs-only: bumps the
# patch version, tags it, then runs the full release.yml pipeline (tests,
# Docker image, GitHub Release) against that tag.

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"

permissions:
  contents: write
  packages: write

concurrency:
  group: auto-release-main
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          latest=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            new="v0.1.0"
          else
            IFS='.' read -r major minor patch <<< "${latest#v}"
            new="v${major}.${minor}.$((patch + 1))"
          fi
          echo "Latest: ${latest:-<none>} -> New: $new"
          echo "tag=$new" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

  release:
    needs: tag
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.tag.outputs.tag }}
    secrets: inherit
