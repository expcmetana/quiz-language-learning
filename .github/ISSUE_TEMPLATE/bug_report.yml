name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / image tag
      description: e.g. `v0.1.0`, or the commit SHA if running from source
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: "`docker compose logs` output, if applicable"
      render: shell
    validations:
      required: false
