<div class="quiz-screen">
  <div class="quiz-summary">
    <div class="quiz-summary__label">Сессия завершена</div>
    {% if deck %}<div class="quiz-summary__deck">{{ deck.name }}</div>{% endif %}
    <div class="quiz-summary__score">{{ correct }} / {{ total }}</div>
    <div class="quiz-summary__pct">{% if total %}{{ (100 * correct / total) | round | int }}%{% else %}—{% endif %} правильных</div>
    <div class="quiz-summary__meter"><span style="width: {% if total %}{{ (100 * correct / total) | round | int }}{% else %}0{% endif %}%;"></span></div>
    <a class="quiz-next" href="/dashboard">К обзору</a>
  </div>
</div>
