{% from "study/_quiz.html" import header, vocab_question %}
<div class="quiz-screen">
  {{ header(sess, deck, "Введите перевод", position, total) }}
  {{ vocab_question(word, highlight) }}
  <form class="quiz-input-wrap"
        hx-post="/study/{{ sess.id }}/answer" hx-target="#card" hx-swap="innerHTML">
    <input class="quiz-input" name="answer" autocomplete="off" autofocus>
    <button class="quiz-next" type="submit">Проверить</button>
  </form>
  <div class="quiz-footer">Enter — проверить · Esc — прервать</div>
</div>
