<div class="pos">{{ position }} / {{ total }}</div>
<div class="flashcard" style="min-height:auto;">
  <div class="word-es">{{ word.es }}</div>
  {% if word.example %}<div class="example">{{ word.example }}</div>{% endif %}
</div>
<form class="row" style="margin-top:1.25rem;"
      hx-post="/study/{{ sess.id }}/answer" hx-target="#card" hx-swap="innerHTML">
  <input name="answer" placeholder="Перевод на русский" autocomplete="off" autofocus style="flex:1;">
  <button class="primary">Проверить</button>
</form>
