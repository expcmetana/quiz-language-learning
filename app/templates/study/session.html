{% extends "base.html" %}
{% set mode_labels = {'flashcards': 'Флэш-карты', 'choice': 'Выбор варианта', 'typed': 'Написать перевод'} %}
{% block title %}{{ deck.name }} — {{ mode_labels.get(sess.mode, sess.mode) }}{% endblock %}
{% block content %}
<div id="card" hx-get="/study/{{ sess.id }}/card" hx-trigger="load" hx-swap="innerHTML"></div>
<script src="{{ static_url('js/quiz.js') }}" defer></script>
{% endblock %}
