{% from "study/_quiz.html" import header, footer, vocab_question %}
<div class="quiz-screen">
  {{ header(sess, deck, "Выберите перевод", position, total) }}
  {{ vocab_question(word, highlight) }}
  <div class="quiz-grid">
    {% for opt in options %}
    <button class="quiz-option"
            hx-post="/study/{{ sess.id }}/answer"
            hx-vals='{{ {"answer": opt, "options": options | tojson} | tojson }}'
            hx-target="#card" hx-swap="innerHTML">
      <span class="quiz-num">{{ loop.index }}</span><span class="quiz-opt-text">{{ opt }}</span>
    </button>
    {% endfor %}
  </div>
  {{ footer() }}
</div>
