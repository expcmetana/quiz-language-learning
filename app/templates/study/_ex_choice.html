<div class="pos">{{ position }} / {{ total }}</div>
<div class="flashcard" style="min-height:auto;">
  <div class="ex-prompt">{{ exercise.prompt }}</div>
  {% if exercise.hint %}<div class="ex-hint muted small">{{ exercise.hint }}</div>{% endif %}
</div>
<div class="options">
  {% for opt in options %}
    <button hx-post="/study/{{ sess.id }}/answer"
            hx-vals='{{ {"answer": opt} | tojson }}'
            hx-target="#card" hx-swap="innerHTML">{{ opt }}</button>
  {% endfor %}
</div>
