<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ES-RU Тренажёр{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <script src="/static/js/htmx.min.js" defer></script>
</head>
<body>
  <nav class="nav">
    <a class="brand" href="/dashboard">ES → RU</a>
    <a href="/dashboard">Обзор</a>
    <a href="/decks">Колоды</a>
    <a href="/stats">Статистика</a>
    <span class="spacer"></span>
    {% if profile %}
      <span class="profile-name">{{ profile.name }}</span>
      <form method="post" action="/profiles/logout">
        <button class="btn-ghost btn-sm">Выйти</button>
      </form>
    {% endif %}
  </nav>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
